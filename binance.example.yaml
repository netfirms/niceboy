# Binance Configuration for niceboy
active_exchange: binance
dry_run: true # Set to false for real trading

# Order Settings
order_quantity: 0.001 # Amount of BTC per trade
slippage_pct: 0.1     # Max allowed slippage

# Strategy: SMA Crossover (Fast > Slow)
strategy: sma_crossover
strategy_parameters:
  short_period: 5
  long_period: 10
  stop_loss_pct: 1.5
  take_profit_pct: 3.0

exchanges:
  binance:
    name: binance
    key: "YOUR_BINANCE_API_KEY"
    secret: "YOUR_BINANCE_SECRET"
    symbol: "BTCUSDT"
